<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="T20">
  <defs>
    <linearGradient id="bw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#8a93a1"/>
    </linearGradient>
    <radialGradient id="rbg" cx="50%" cy="44%" r="62%">
      <stop offset="0" stop-color="#2a3038" stop-opacity="0.85"/>
      <stop offset="0.65" stop-color="#15191f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0b0f16" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="256" fill="url(#rbg)"/>

  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="182" fill="none" stroke="url(#bw)" stroke-width="36"
            stroke-linecap="round" stroke-dasharray="58 34"/>
    <circle cx="256" cy="256" r="150" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.30"/>
    <text x="256" y="262" text-anchor="middle" dominant-baseline="central" fill="url(#bw)"
          font-family="'Trebuchet MS','Arial Rounded MT Bold',Arial,sans-serif"
          font-weight="800" font-size="132" letter-spacing="-6">T20</text>
  </g>
</svg>
