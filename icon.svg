<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="plus-minus">
  <defs>
    <linearGradient id="bw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#8a93a1"/>
    </linearGradient>
    <radialGradient id="rbg" cx="50%" cy="44%" r="62%">
      <stop offset="0" stop-color="#2a3038" stop-opacity="0.85"/>
      <stop offset="0.65" stop-color="#15191f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0b0f16" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="256" fill="url(#rbg)"/>

  <g filter="url(#glow)">
    <g fill="url(#bw)">
      <!-- plus (top-left) -->
      <rect x="128" y="160" width="96" height="32" rx="10"/>
      <rect x="160" y="128" width="32" height="96" rx="10"/>
      <!-- minus (bottom-right) -->
      <rect x="288" y="320" width="96" height="32" rx="10"/>
    </g>
    <!-- diagonal slash -->
    <line x1="140" y1="372" x2="372" y2="140" stroke="url(#bw)" stroke-width="34" stroke-linecap="round"/>
  </g>
</svg>
