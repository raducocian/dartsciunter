<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="T20">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1424"/>
      <stop offset="1" stop-color="#070b12"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#tile)"/>
  <rect x="6" y="6" width="500" height="500" rx="112" fill="none" stroke="url(#neon)" stroke-width="3" opacity="0.5"/>

  <g filter="url(#glow)">
    <!-- segmented neon ring -->
    <circle cx="256" cy="256" r="188" fill="none" stroke="url(#neon)" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="64 26"/>
    <circle cx="256" cy="256" r="150" fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.45"/>
    <!-- T20 -->
    <text x="256" y="266" text-anchor="middle" dominant-baseline="central" fill="url(#neon)"
          font-family="'Trebuchet MS','Arial Rounded MT Bold',Arial,sans-serif"
          font-weight="800" font-size="176" letter-spacing="-8">T20</text>
  </g>
</svg>
