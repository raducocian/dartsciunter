    <text x="256" y="266" text-anchor="middle" dominant-baseline="central" fill="#e9e2d0"
          font-family="'Trebuchet MS','Arial Rounded MT Bold',Arial,sans-serif"
          font-weight="800" font-size="184" letter-spacing="-8">T20</text>
  </g>
